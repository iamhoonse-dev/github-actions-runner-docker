services:
  runner:
    build:
      context: ./docker
    restart: always
    env_file:
      - .env
    environment:
      - RUNNER_NAME=${RUNNER_NAME:-docker-runner}
      - RUNNER_LABELS=${RUNNER_LABELS:-self-hosted,linux,docker}

    # Resource limits: prevent crypto mining / resource abuse
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

    # Network isolation: block access to host network and cloud metadata
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:127.0.0.1"
      # Block cloud metadata endpoints
      - "169.254.169.254:127.0.0.1"

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=1G

    # Uncomment ONLY if your workflows need Docker commands:
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock